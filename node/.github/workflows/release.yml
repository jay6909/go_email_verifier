name: Publish to npm

on:
  push:
    branches: [ main ] # Triggers when Go repo pushes new binaries

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
      
      - name: Publish
        run: npm publish --access public --provenance
