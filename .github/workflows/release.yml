name: Build cross platform binaries and sync to repos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ext: so
          - os: windows-latest
            ext: dll
          - os: macos-latest
            ext: dylib
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6' 
      - name: Install C Compiler (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build Shared Library
        run: go build -o libverifier.${{ matrix.ext }} -buildmode=c-shared .
        env:
          CGO_ENABLED: 1
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libverifier-${{ matrix.os }}
          path: |
            libverifier.${{ matrix.ext }}
            libverifier.h

  sync: # This must be at the same indentation as 'build'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: ./bins
      
      - name: Push to Node Repo
        env:
          NODE_REPO_PAT: ${{ secrets.NODE_EMAIL_VERIFIER_REPO_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Replace with your actual new repo name
          git clone https://x-access-token:${NODE_REPO_PAT}@github.com/jay6909/node_email_verifier node_dest
          
          cp bins/libverifier-ubuntu-latest/libverifier.so node_dest/
          cp bins/libverifier-windows-latest/libverifier.dll node_dest/
          cp bins/libverifier-macos-latest/libverifier.dylib node_dest/
          
          cd node_dest
          git add .
          # 3. Commit only if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update binaries from core"
            # 4. EXPLICITLY use the token in the push URL
            git push https://x-access-token:${NODE_REPO_PAT}@github.com/jay6909/node_email_verifier main
          else
            echo "No changes detected, skipping push."
          fi